{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Member</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#dbeafe 0%,transparent 30%),
    radial-gradient(circle at bottom right,#cffafe 0%,transparent 30%),
    #f8fbff;
}

.container{
    width:60%;
    margin:40px auto;
    background:white;
    border-radius:30px;
    padding:35px;
    box-shadow:0 18px 45px rgba(15,23,42,.10);
}

h2{
    font-size:36px;
    font-weight:950;
    color:#0f172a;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    font-weight:900;
    margin-bottom:8px;
    color:#0f172a;
}

input,
select,
textarea{
    width:100%;
    padding:14px 16px;
    border:1px solid #dbeafe;
    border-radius:18px;
    outline:none;
    font-size:15px;
    font-weight:700;
    background:#f8fafc;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#2563eb;
    background:white;
    box-shadow:0 0 0 4px rgba(37,99,235,.12);
}

.btn-row{
    display:flex;
    gap:12px;
    margin-top:25px;
}

.save-btn{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
    border:none;
    padding:14px 24px;
    border-radius:18px;
    font-weight:950;
    cursor:pointer;
}

.back-btn{
    background:#fee2e2;
    color:#dc2626;
    padding:14px 24px;
    border-radius:18px;
    font-weight:950;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

    <h2>
        <i class="bi bi-pencil-square"></i>
        Edit Member
    </h2>

    <form method="GET" action="/update_member/{{ member.mid }}/">

        <div class="form-group">
            <label>Member Name</label>
            <input type="text" name="mname" value="{{ member.mname }}" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="text" name="mpass" value="{{ member.mpass }}" required>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="maddress" required>{{ member.maddress }}</textarea>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="mgender">
                <option value="Male" {% if member.mgender == "Male" %}selected{% endif %}>Male</option>
                <option value="Female" {% if member.mgender == "Female" %}selected{% endif %}>Female</option>
                <option value="Other" {% if member.mgender == "Other" %}selected{% endif %}>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="text" name="mage" value="{{ member.mage }}" required>
        </div>

        <div class="form-group">
            <label>Join Date</label>
            <input type="text" name="mtime" value="{{ member.mtime }}" required>
        </div>

        <div class="form-group">
            <label>Mobile</label>
            <input type="text" name="mmobile" value="{{ member.mmobile }}" required>
        </div>

        <div class="btn-row">
            <button type="submit" class="save-btn">
                <i class="bi bi-save-fill"></i>
                Update Member
            </button>

            <a href="/adminmember/" class="back-btn">
                <i class="bi bi-arrow-left"></i>
                Back
            </a>
        </div>

    </form>

</div>

</body>
</html>
