{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at 10% 10%,#dbeafe 0,#dbeafe 18%,transparent 35%),
    radial-gradient(circle at 90% 20%,#cffafe 0,#cffafe 16%,transparent 32%),
    radial-gradient(circle at 50% 100%,#fef3c7 0,#fef3c7 14%,transparent 35%),
    #f8fbff;
}

.forgot-card{
    width:95%;
    max-width:650px;
    margin:60px auto;
    background:white;
    border-radius:35px;
    padding:45px;
    box-shadow:0 20px 55px rgba(15,23,42,.12);
    border:1px solid #e2e8f0;
    position:relative;
    overflow:hidden;
}

.forgot-card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    height:9px;
    width:100%;
    background:linear-gradient(135deg,#2563eb,#06b6d4,#22c55e);
}

.icon-box{
    width:95px;
    height:95px;
    margin:0 auto 22px;
    border-radius:30px;
    background:linear-gradient(135deg,#eff6ff,#ecfeff);
    color:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    border:1px solid #bfdbfe;
}

.title{
    text-align:center;
    font-size:40px;
    font-weight:950;
    color:#0f172a;
}

.subtitle{
    text-align:center;
    color:#64748b;
    font-weight:700;
    margin-bottom:30px;
}

.form-label{
    font-weight:900;
    color:#0f172a;
}

.input-group{
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(37,99,235,.06);
}

.input-group-text{
    background:#eff6ff;
    color:#2563eb;
    border:1px solid #dbeafe;
    min-width:55px;
    justify-content:center;
}

.form-control{
    height:52px;
    border:1px solid #dbeafe;
    background:#f8fafc;
    font-weight:700;
}

.form-control:focus{
    box-shadow:0 0 0 4px rgba(37,99,235,.12);
    border-color:#2563eb;
}

.reset-btn{
    width:100%;
    height:54px;
    border:none;
    border-radius:18px;
    color:white;
    font-weight:950;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    transition:.3s;
}

.reset-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 28px rgba(37,99,235,.35);
}

.back-link{
    display:block;
    text-align:center;
    margin-top:18px;
    color:#2563eb;
    font-weight:800;
    text-decoration:none;
}

.back-link:hover{
    text-decoration:underline;
}

.alert{
    border-radius:18px;
    font-weight:800;
}
</style>
</head>

<body>

<div class="forgot-card">

    <div class="icon-box">
        <i class="fa-solid fa-key"></i>
    </div>

    <h1 class="title">Forgot Password</h1>

    <p class="subtitle">
        Enter your name and mobile number to reset your password.
    </p>

    {% if msg %}
    <div class="alert alert-{{ type }}">
        {{ msg }}
    </div>
    {% endif %}

    <form method="POST" action="/memberforgotpassword/">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Member Name</label>

            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-solid fa-user"></i>
                </span>

                <input type="text"
                       name="mname"
                       class="form-control"
                       placeholder="Enter your registered name"
                       required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Mobile Number</label>

            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-solid fa-phone"></i>
                </span>

                <input type="text"
                       name="mmobile"
                       class="form-control"
                       placeholder="Enter registered mobile number"
                       required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">New Password</label>

            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-solid fa-lock"></i>
                </span>

                <input type="password"
                       name="new_password"
                       class="form-control"
                       placeholder="Enter new password"
                       required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Confirm Password</label>

            <div class="input-group">
                <span class="input-group-text">
                    <i class="fa-solid fa-circle-check"></i>
                </span>

                <input type="password"
                       name="confirm_password"
                       class="form-control"
                       placeholder="Confirm new password"
                       required>
            </div>
        </div>

        <button type="submit" class="reset-btn">
            <i class="fa-solid fa-floppy-disk"></i>
            Reset Password
        </button>

    </form>

    <a href="{% url 'memberlogin' %}" class="back-link">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Login
    </a>

</div>

</body>
</html>
