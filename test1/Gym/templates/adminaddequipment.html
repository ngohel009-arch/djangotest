{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Equipment</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fb;
    padding:25px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.card{
    background:#fff;
    border-radius:18px;
    padding:20px;
    box-shadow:0 2px 12px rgba(0,0,0,.08);
}

/* Header */

.header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:25px;
}

.header h2{
    font-size:40px;
    color:#1f2937;
    font-weight:700;
}

.header p{
    color:#6b7280;
    margin-top:5px;
}

.back-btn{
    text-decoration:none;
    color:#374151;
    border:1px solid #cbd5e1;
    padding:10px 16px;
    border-radius:10px;
    font-size:14px;
}

.back-btn:hover{
    background:#f3f4f6;
}

/* Form */

.form-box{
    border:1px solid #e5e7eb;
    border-radius:12px;
    padding:18px;
}

.row{
    display:grid;
    grid-template-columns:2fr 120px 200px 180px;
    gap:12px;
    align-items:start;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#374151;
}

.required{
    color:red;
}

.input-group{
    position:relative;
}

.input-group i{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:#6b7280;
}

.input-group input{
    width:100%;
    height:42px;
    border:1px solid #d1d5db;
    border-radius:8px;
    padding-left:38px;
    padding-right:10px;
    font-size:14px;
}

.help-text{
    font-size:12px;
    color:#6b7280;
    margin-top:5px;
}

/* Buttons */

.actions{
    margin-top:18px;
    display:flex;
    gap:10px;
}

.save-btn{
    background:#1f2937;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
}

.cancel-btn{
    text-decoration:none;
    color:#6b7280;
    border:1px solid #d1d5db;
    padding:10px 16px;
    border-radius:10px;
    font-size:14px;
}

.note{
    margin-top:10px;
    font-size:13px;
    color:#6b7280;
}

@media(max-width:992px){

    .row{
        grid-template-columns:1fr;
    }

    .header{
        flex-direction:column;
        gap:15px;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="header">

            <div>
                <h2>
                    <i class="bi bi-tools"></i>
                    Add Equipment
                </h2>

                <p>
                    Maintain gym equipment inventory and purchase details.
                </p>
            </div>

            <a href="{% url 'adminequipment' %}" class="back-btn">
                <i class="bi bi-arrow-left"></i>
                Back to Equipment
            </a>

        </div>

        <div class="form-box">

            <form method="GET" action="/addequipment">
                {% csrf_token %}

                <div class="row">

                    <!-- Equipment Name -->

                    <div class="form-group">

                        <label>
                            Name <span class="required">*</span>
                        </label>

                        <div class="input-group">
                            <i class="bi bi-tools"></i>

                            <input
                                type="text"
                                name="ename"
                                placeholder="e.g. Treadmill / Bench Press / Dumbbell Set"
                                required
                            >
                        </div>

                    </div>

                    <!-- Units -->

                    <div class="form-group">

                        <label>
                            Units <span class="required">*</span>
                        </label>

                        <div class="input-group">
                            <i class="bi bi-boxes"></i>

                            <input
                                type="number"
                                name="units"
                                value="0"
                                min="0"
                                required
                            >
                        </div>

                    </div>

                    <!-- Price -->

                    <div class="form-group">

                        <label>
                            Price <span class="required">*</span>
                        </label>

                        <div class="input-group">
                            <i class="bi bi-currency-rupee"></i>

                            <input
                                type="number"
                                step="0.01"
                                name="price"
                                placeholder="e.g. 25000"
                                required
                            >
                        </div>

                        <div class="help-text">
                            Enter purchase price (in INR).
                        </div>

                    </div>

                    <!-- Purchase Date -->

                    <div class="form-group">

                        <label>
                            Purchase Date
                        </label>

                        <div class="input-group">
                            <i class="bi bi-calendar"></i>

                            <input
                                type="date"
                                name="purchase_date"
                            >
                        </div>

                    </div>

                </div>

                <div class="actions">

                    <button type="submit" class="save-btn">
                        <i class="bi bi-floppy-fill"></i>
                        Save Equipment
                    </button>

                    <a href="{% url 'adminequipment' %}" class="cancel-btn">
                        <i class="bi bi-x-lg"></i>
                        Cancel
                    </a>

                </div>

                <div class="note">
                    Fields marked with <span class="required">*</span> are mandatory.
                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
